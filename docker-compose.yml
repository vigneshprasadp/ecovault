version: '3.8'

services:
  redis:
    image: redislabs/rebloom:latest
    container_name: echovault-redis
    ports:
      - "6379:6379"

  postgres:
    image: postgres:15
    container_name: echovault-postgres
    environment:
      POSTGRES_USER: echovault
      POSTGRES_PASSWORD: echopassword!
      POSTGRES_DB: echo_shadowpulse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  kafka:
    image: bitnami/kafka:3.4
    container_name: echovault-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER

  rabbitmq:
    image: rabbitmq:3-management
    container_name: echovault-rabbit
    ports:
      - "5672:5672"
      - "15672:15672"

  ray-head:
    image: rayproject/ray:latest
    container_name: echovault-ray
    ports:
      - "6378:6379"
      - "8265:8265"
    command: bash -c "ray start --head --dashboard-host=0.0.0.0 --block"

volumes:
  pgdata:
